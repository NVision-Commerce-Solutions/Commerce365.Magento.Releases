name: Publish latest Release ZIP as GitHub NuGet (Org feed)

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  pack_and_push:
    runs-on: windows-latest

    steps:
      - name: Checkout repository (for nuspec)
        uses: actions/checkout@v4

      - name: Resolve latest release tag + version
        id: rel
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = (gh release view --repo "$env:GITHUB_REPOSITORY" --json tagName -q ".tagName").Trim()
          if (-not $tag) { throw "Unable to determine latest release tag." }

          $version = $tag.TrimStart("v")

          Write-Host "Latest release tag: $tag"
          Write-Host "NuGet version:      $version"

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Download latest release zip asset(s)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.rel.outputs.tag }}
        run: |
          New-Item -ItemType Directory -Force -Path "staging\release" | Out-Null

          gh release download "$env:TAG" --repo "$env:GITHUB_REPOSITORY" --pattern "*.zip" --dir "staging\release"

          $zips = Get-ChildItem "staging\release" -Filter *.zip
          if ($zips.Count -eq 0) { throw "No .zip assets found on release $env:TAG." }

          New-Item -ItemType Directory -Force -Path "staging\apps" | Out-Null

          foreach ($zip in $zips) {
            Write-Host "Extracting: $($zip.Name)"
            Expand-Archive -Path $zip.FullName -DestinationPath "staging\apps" -Force
          }

          $apps = Get-ChildItem "staging\apps" -Recurse -Filter *.app
          if ($apps.Count -eq 0) { throw "No .app files found after extraction." }

          Write-Host "Found .app files:"
          $apps | ForEach-Object { Write-Host " - $($_.FullName)" }

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Pack NuGet package
        shell: pwsh
        env:
          VERSION: ${{ steps.rel.outputs.version }}
        run: |
          New-Item -ItemType Directory -Force -Path "artifacts" | Out-Null

          nuget pack "nuget\Commerce365.Magento.nuspec" -Version "$env:VERSION" -BasePath "$env:GITHUB_WORKSPACE" -OutputDirectory "artifacts"

      - name: Push to GitHub Packages (Organisation feed)
        shell: pwsh
        env:
          ORG: "NVision-Commerce-Solutions"
          API_KEY: ${{ secrets.GHTOKENWORKFLOW }}
        run: |
          if (-not $env:API_KEY) { throw "Missing secret GHTOKENWORKFLOW." }

          $source = "https://nuget.pkg.github.com/$env:ORG/index.json"

          nuget sources Remove -Name "github-org" -NonInteractive -ErrorAction SilentlyContinue | Out-Null
          nuget sources Add -Name "github-org" -Source "$source" -UserName "$env:ORG" -Password "$env:API_KEY" -StorePasswordInClearText -NonInteractive

          nuget push "artifacts\*.nupkg" -Source "github-org" -ApiKey "$env:API_KEY" -SkipDuplicate