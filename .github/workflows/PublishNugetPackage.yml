name: Publish Release ZIP as GitHub NuGet

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to package (e.g. v1.2.3)"
        required: true

permissions:
  contents: read
  packages: write

jobs:
  pack_and_push:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag }}"
          $version = $tag.TrimStart("v")
          Write-Host "Using version: $version"
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Download release asset zip
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag }}
        run: |
          New-Item -ItemType Directory -Force -Path staging\release | Out-Null

          gh release download "$env:TAG" `
            --repo "${env:GITHUB_REPOSITORY}" `
            --pattern "*.zip" `
            --dir "staging\release"

          $zips = Get-ChildItem "staging\release" -Filter *.zip
          if ($zips.Count -eq 0) { throw "No .zip assets found on the release." }
          if ($zips.Count -gt 1) { Write-Host "Multiple zips found; using first one: $($zips[0].Name)" }

          $zipPath = $zips[0].FullName

          New-Item -ItemType Directory -Force -Path staging\apps | Out-Null
          Expand-Archive -Path $zipPath -DestinationPath staging\apps -Force

          $apps = Get-ChildItem "staging\apps" -Recurse -Filter *.app
          if ($apps.Count -eq 0) { throw "No .app files found inside the zip." }

          Write-Host "Found .app files:"
          $apps | ForEach-Object { Write-Host " - $($_.FullName)" }

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Create nuspec
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          New-Item -ItemType Directory -Force -Path nuget | Out-Null

          $nuspec = @'
<?xml version="1.0"?>
<package>
  <metadata>
    <id>YourCompany.BusinessCentral.RuntimeApps</id>
    <version>__VERSION__</version>
    <authors>YourCompany</authors>
    <description>Business Central runtime .app packages from GitHub Release assets.</description>
    <repository type="git" url="https://github.com/__REPO__" />
  </metadata>
  <files>
    <file src="staging\apps\**\*.app" target="contentFiles\any\any\" />
  </files>
</package>
'@

          $nuspec = $nuspec.Replace('__VERSION__', $env:VERSION)
          $nuspec = $nuspec.Replace('__REPO__', $env:GITHUB_REPOSITORY)

          $nuspec | Out-File -FilePath nuget\package.nuspec -Encoding utf8

      - name: Pack nupkg
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          nuget pack nuget\package.nuspec -OutputDirectory artifacts

      - name: Push to GitHub Packages
        shell: pwsh
        env:
          SOURCE: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
          API_KEY: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
        run: |
          nuget sources Remove -Name "github" -NonInteractive -ErrorAction SilentlyContinue | Out-Null
          nuget sources Add -Name "github" `
            -Source "$env:SOURCE" `
            -UserName "$env:OWNER" `
            -Password "$env:API_KEY" `
            -StorePasswordInClearText

          nuget push "artifacts\*.nupkg" `
            -Source "github" `
            -ApiKey "$env:API_KEY" `
            -SkipDuplicate