name: Publish Release ZIP as GitHub NuGet

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.2.3)"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  pack_and_push:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Compute version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag }}"
          $version = $tag.TrimStart("v")
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Download release asset
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag }}
        run: |
          New-Item -ItemType Directory -Force -Path staging\release | Out-Null

          gh release download "$env:TAG" --repo "$env:GITHUB_REPOSITORY" --pattern "*.zip" --dir staging\release

          $zip = Get-ChildItem staging\release -Filter *.zip | Select-Object -First 1
          if (-not $zip) { throw "No zip asset found." }

          Expand-Archive $zip.FullName -DestinationPath staging\apps -Force

      - uses: nuget/setup-nuget@v2

      - name: Pack
        shell: pwsh
        run: |
          nuget pack nuget\Commerce365.Magento.nuspec `
            -Version "${{ steps.version.outputs.version }}" `
            -OutputDirectory artifacts

      - name: Push
        shell: pwsh
        env:
          SOURCE: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
          API_KEY: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
        run: |
          nuget sources Add -Name github -Source "$env:SOURCE" -UserName "$env:OWNER" -Password "$env:API_KEY" -StorePasswordInClearText -NonInteractive
          nuget push "artifacts\*.nupkg" -Source github -ApiKey "$env:API_KEY" -SkipDuplicate